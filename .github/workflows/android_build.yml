name: Android Build & Package Release CI

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggers from the GitHub UI

jobs:
  build:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating release and uploading APK assets

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Create Mock Env Variables for Secrets Plugin
      run: |
        echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY || 'MOCK_GEMINI_API_KEY' }}" > .env
        echo "API_INTEGRATION_URL=https://api.example.com" >> .env

    - name: Decode Signing Keystore
      id: decode_keystore
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Decoding keystore from secrets..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > app/my-upload-key.jks
          echo "has_keystore=true" >> $GITHUB_OUTPUT
        else
          echo "No keystore secret found, falling back to debug signature or unsigned build."
          echo "has_keystore=false" >> $GITHUB_OUTPUT
        fi

    - name: Build Android Release App Variant
      env:
        # Pass secrets as environment variables matching app/build.gradle.kts configuration
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        KEYSTORE_PATH: ${{ github.workspace }}/app/my-upload-key.jks
      run: |
        if [ "${{ steps.decode_keystore.outputs.has_keystore }}" = "true" ]; then
          echo "Building signed Release APK..."
          gradle assembleRelease --no-daemon
        else
          echo "Building standard Debug APK & Unsigned/Self-Signed Release APK..."
          # Build both to ensure code compilation check passes
          gradle assembleDebug --no-daemon
        fi

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Lotomania-AI-PRO-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: ignore

    - name: Upload Release APK Artifact
      if: steps.decode_keystore.outputs.has_keystore == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Lotomania-AI-PRO-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create Automated GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/debug/app-debug.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
