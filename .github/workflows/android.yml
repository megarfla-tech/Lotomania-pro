name: Android Build & Package Release CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Compile and Package APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'zulu'
        cache: gradle

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v1

    - name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Create Mock Environment Secrets
      run: |
        echo "GEMINI_API_KEY=MY_GEMINI_API_KEY" > .env
        echo "API_INTEGRATION_URL=https://api.example.com" >> .env

    - name: Build Debug App Variant
      run: ./gradlew assembleDebug --no-daemon

    - name: Archiving Compiled Binary Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Lotomania_AI_PRO-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
